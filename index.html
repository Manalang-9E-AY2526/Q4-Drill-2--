<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
     <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="container mt-5">
        <h1>Heat Index Checker</h1>
        <p>Enter temperature and humidity.</p>

        <button class="btn btn-info mb-3" onclick="showInstructions()">
            Instructions
        </button>

        <p id="instructions">
            Type the temperature and humidity then click check.
        </p>

        <label>Temperature (°C)</label>
        <input type="number" id="temp" class="form-control">

        <br>

        <label>Humidity (%)</label>
        <input type="number" id="humidity" class="form-control">

        <br>

        <button class="btn btn-primary" onclick="checkHeat()">
            Check Heat Index
        </button>

        <br><br>

        <div id="result"></div>

        <br>

        <a href="https://www.weather.gov/" target="_blank">
            NOAA Source
        </a>

    </div>

    <script src="main.js"></script>
</body>
</html>
